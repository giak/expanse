// ─── Compute nature from tags ───
function computeNature(tags){
  const t=tags.join(' ')
  if(t.includes('sys:core')||t.includes('sys:anchor')||t.includes('sys:snapshot'))return'permanent'
  if(t.includes('trace:fresh')||t.includes('sys:drift'))return'incandescent'
  if(t.includes('sys:pattern:candidate')||t.includes('sys:extension')||t.includes('sys:pattern:doubt'))return'volatile'
  if(t.includes('sys:pattern')||t.includes('sys:history')||t.includes('sys:protocol'))return'vivide'
  if(t.includes('memoire'))return'vivide'
  if(t.includes('mutation')&&t.includes('applied'))return'vivide'
  if(t.includes('mutation')&&t.includes('rejected'))return'incandescent'
  if(t.includes('mutation')&&t.includes('rolled_back'))return'incandescent'
  if(t.includes('drift'))return'incandescent'
  return null
}

// ─── Compute radius from centrality ───
function computeRadius(n){
  if(n.type==='ORGAN')return 28
  if(n.type==='APEX')return 10+Math.min(n.centrality,20)*0.5
  return 5+Math.min(n.centrality,10)*0.3
}

// LAYOUTS — ALGORITHMES DE CROISSANCE DÉTERMINISTES
// Zéro Math.random() — Chaque type a sa signature géométrique
// ═══════════════════════════════════════════════════════════

let layoutHeart={}, layoutTimeline={}, layoutMemory={}

// ─── Helper: seeded deterministic noise ───
function hashNoise(seed){seed=(seed||1)+1;let h=seed*2654435761;h=((h>>16)^h)*0x45d9f3b;return((h>>16)^h&0xffff)/0xffff}

function computeLayouts(){
  computeHeartLayout()
  computeTimelineLayout()
  computeMemoryLayout()
}

function computeHeartLayout(){
  const cx=0,cy=0
  // Group nodes by type
  const byType={}
  nodes.forEach(n=>{if(!byType[n.type])byType[n.type]=[];byType[n.type].push(n)})

  // ── ORGANS: sur l'anneau vital (déjà bon) ──
  byType.ORGAN && byType.ORGAN.forEach(n=>{
    const sym=ORGAN_IDS[n.id]
    const a=ORGAN_ANGLES[sym]||0
    layoutHeart[n.id]={x:cx+Math.cos(a)*VITAL_RING_R,y:cy+Math.sin(a)*VITAL_RING_R}
  })

  // ── APEX: Double hélice dans le noyau (ADN) ──
  // 7 apex → 2 brins entrelacés
  byType.APEX && byType.APEX.forEach((n,i)=>{
    const strand = i % 2 // 0 ou 1
    const t = Math.floor(i/2) // position le long du brin
    const helixR = 18
    const yPos = -30 + t * 20
    const phase = strand * Math.PI // déphasage de π entre les 2 brins
    const twist = t * 1.2 // torsion de l'hélice
    const x = cx + Math.cos(twist + phase) * helixR
    const y = cy + yPos
    layoutHeart[n.id]={x,y}
  })

  // ── REGLE: Arbre branchant depuis Ψ (dendrites) ──
  // 31 règles → arbre 3-naire depuis la position de Ψ
  if(byType.REGLE){
    const psiPos = layoutHeart['or9'] || {x:0,y:0}
    const baseAngle = ORGAN_ANGLES['Ψ']
    byType.REGLE.forEach((n,i)=>{
      if(i===0){
        // Racine: juste derrière Ψ
        layoutHeart[n.id]={x:psiPos.x+Math.cos(baseAngle+Math.PI)*15, y:psiPos.y+Math.sin(baseAngle+Math.PI)*15}
      } else {
        // Branches: profondeur = floor(log3(i)), angle déterministe
        const depth = Math.floor(Math.log(i+1)/Math.log(2))
        const branchAngle = baseAngle + Math.PI + (hashNoise(i*137) - 0.5) * 0.4 * (depth+1)
        const branchR = 35 + depth * 35
        // Offset depuis Ψ
        const ox = Math.cos(branchAngle) * branchR
        const oy = Math.sin(branchAngle) * branchR
        layoutHeart[n.id]={x:psiPos.x+ox, y:psiPos.y+oy}
      }
    })
  }

  // ── COMMANDE: Cils sur la membrane externe ──
  // 14 commandes → réparties uniformément sur le pourtour extérieur
  if(byType.COMMANDE){
    const outerR = VITAL_RING_R + 160
    byType.COMMANDE.forEach((n,i)=>{
      const angle = (i / byType.COMMANDE.length) * Math.PI * 2 - Math.PI/2
      layoutHeart[n.id]={x:cx+Math.cos(angle)*outerR, y:cy+Math.sin(angle)*outerR}
    })
  }

  // ── PROTOCOLE: Arcs concentriques (appareil de Golgi) accolés à l'intérieur de Μ ──
  if(byType.PROTOCOLE){
    const muPos = layoutHeart['or12'] || {x:0,y:0}
    byType.PROTOCOLE.forEach((n,i)=>{
      const layer = Math.floor(i/3) // 3 par couche
      const idx = i % 3
      const baseA = ORGAN_ANGLES['Μ'] + Math.PI // côté intérieur
      const a = baseA - 0.25 + idx * 0.25
      const r = 25 + layer * 18
      layoutHeart[n.id]={x:muPos.x+Math.cos(a)*r, y:muPos.y+Math.sin(a)*r}
    })
  }

  // ── OUTIL: Pseudopodes ondulants depuis Φ ──
  // Lignes sinueuses qui s'étendent vers l'extérieur
  if(byType.OUTIL){
    const phiPos = layoutHeart['or10'] || {x:0,y:0}
    const baseAngle = ORGAN_ANGLES['Φ']
    // Diviser en groupes MCP et IDE
    const mcpTools = byType.OUTIL.filter(n=>n.tags.includes('mcp'))
    const ideTools = byType.OUTIL.filter(n=>n.tags.includes('ide'))
    const skillTools = byType.OUTIL.filter(n=>n.tags.includes('skill'))

    // MCP: tentacules courts et denses vers le centre
    mcpTools.forEach((n,i)=>{
      const a = baseAngle + Math.PI + (i - mcpTools.length/2) * 0.12
      const waveR = 30 + i * 12 + Math.sin(i * 1.8) * 15
      layoutHeart[n.id]={x:phiPos.x+Math.cos(a)*waveR, y:phiPos.y+Math.sin(a)*waveR}
    })

    // IDE: tentacules longs vers l'extérieur
    ideTools.forEach((n,i)=>{
      const a = baseAngle + (i - ideTools.length/2) * 0.18
      const waveR = 50 + i * 30 + Math.sin(i * 2.1) * 20
      layoutHeart[n.id]={x:phiPos.x+Math.cos(a)*waveR, y:phiPos.y+Math.sin(a)*waveR}
    })

    // Skills: ramification depuis Φ vers le bas
    skillTools.forEach((n,i)=>{
      const depth = Math.floor(i/3)
      const branch = i % 3
      const a = baseAngle + 0.1 + depth * 0.4 + (branch-1) * 0.15
      const r = 40 + depth * 50
      layoutHeart[n.id]={x:phiPos.x+Math.cos(a)*r, y:phiPos.y+Math.sin(a)*r}
    })
  }

  // ── MUTATION: Croûte calcaire sur l'anneau vital ──
  // Entre les organes, le long du ring, comme des écailles
  if(byType.MUTATION){
    // Calculer les angles inter-organes
    const organAngles = ORGAN_ORDER.map(id=>ORGAN_ANGLES[ORGAN_IDS[id]])
    // Placer les mutations entre les organes, sur le ring ± petit offset
    const sorted = [...byType.MUTATION].sort((a,b)=>{
      // Trier par date pour un ordre chronologique sur le ring
      return (a.created_at||'').localeCompare(b.created_at||'')
    })
    sorted.forEach((n,i)=>{
      // Distribuer uniformément sur le ring, entre les organes
      const sector = i % 5 // quel secteur inter-organe
      const posInSector = Math.floor(i/5)
      const a1 = organAngles[sector]
      const a2 = organAngles[(sector+1)%5]
      // Interpolation avec petit gap près des organes
      const gap = 0.15
      const t = (gap + posInSector * 0.08) // espacement régulier dans le secteur
      const a = a1 + (a2-a1) * Math.min(t, 1-gap)
      // Léger offset radial: applied sur le ring, rejected juste à l'extérieur, rolled_back dedans
      let rOffset = 0
      if(n.tags.includes('rejected')) rOffset = 15
      else if(n.tags.includes('rolled_back')) rOffset = -15
      else rOffset = 5 * (hashNoise(i*53) - 0.5) // micro-offset déterministe
      layoutHeart[n.id]={x:cx+Math.cos(a)*(VITAL_RING_R+rOffset), y:cy+Math.sin(a)*(VITAL_RING_R+rOffset)}
    })
  }

  // ── PATTERN: Réseau hexagonal près de Ω (cristaux) ──
  if(byType.PATTERN){
    const omegaPos = layoutHeart['or11'] || {x:0,y:0}
    byType.PATTERN.forEach((n,i)=>{
      // Hexagonal lattice: x = col*w + (row%2)*w/2, y = row*h
      const cols = 5
      const w = 28, h = 24
      const col = i % cols
      const row = Math.floor(i / cols)
      const hexX = col * w + (row % 2) * (w/2) - (cols * w / 2)
      const hexY = row * h - (Math.ceil(byType.PATTERN.length/cols) * h / 2)
      layoutHeart[n.id]={x:omegaPos.x+hexX+Math.cos(ORGAN_ANGLES['Ω'])*40, y:omegaPos.y+hexY+Math.sin(ORGAN_ANGLES['Ω'])*40+30}
    })
  }

  // ── MEMOIRE: Spirale de Fibonacci (phyllotaxie tournesol) depuis Μ ──
  if(byType.MEMOIRE){
    const muPos = layoutHeart['or12'] || {x:0,y:0}
    const goldenAngle = 137.508 * (Math.PI/180) // angle d'or en radians
    byType.MEMOIRE.forEach((n,i)=>{
      const r = 12 * Math.sqrt(i+1) // rayon croissant
      const a = i * goldenAngle // angle d'or
      layoutHeart[n.id]={x:muPos.x+Math.cos(a+Math.PI)*r, y:muPos.y+Math.sin(a+Math.PI)*r}
    })
  }

  // ── DRIFT: Orbites déterministes sur le pourtour (pathogènes) ──
  // Chaque drift a sa propre vitesse orbitale
  if(byType.DRIFT){
    const outerR = VITAL_RING_R + 200
    byType.DRIFT.forEach((n,i)=>{
      const baseA = (i / byType.DRIFT.length) * Math.PI * 2
      const orbitR = outerR + i * 15
      // Stocker la base pour l'animation orbitale
      layoutHeart[n.id]={x:cx+Math.cos(baseA)*orbitR, y:cy+Math.sin(baseA)*orbitR, _baseA:baseA, _orbitR:orbitR}
    })
  }
}

function computeTimelineLayout(){
  const sorted=[...nodes].filter(n=>n.created_at&&!n.created_at.startsWith('2026-04-14T06:50')).sort((a,b)=>{
    return new Date(a.created_at)-new Date(b.created_at)
  })
  const laneOrder=['ORGAN','APEX','REGLE','COMMANDE','OUTIL','PROTOCOLE','MUTATION','PATTERN','MEMOIRE','DRIFT']
  const laneH=60,xSpacing=30,xStart=-400
  sorted.forEach((n,i)=>{
    const lane=laneOrder.indexOf(n.type)
    layoutTimeline[n.id]={x:xStart+i*xSpacing,y:-300+lane*laneH}
  })
}

function computeMemoryLayout(){
  const natureR={permanent:80,vivide:180,volatile:300,incandescent:420}
  const natureCounts={permanent:0,vivide:0,volatile:0,incandescent:0}
  // MCP tools at center
  const tools=nodes.filter(n=>n.type==='OUTIL'&&n.tags.includes('mnemolite'))
  tools.forEach((t,i)=>{
    const a=(i/tools.length)*Math.PI*2
    layoutMemory[t.id]={x:Math.cos(a)*35,y:Math.sin(a)*35}
  })
  // Memory nodes by nature — phyllotaxis per zone
  const memNodes=nodes.filter(n=>n.type==='MEMOIRE'||n.type==='PATTERN'||n.type==='DRIFT'||n.type==='MUTATION')
  memNodes.forEach(n=>{const nat=computeNature(n.tags)||'vivide';natureCounts[nat]++})
  const natureIdx={permanent:0,vivide:0,volatile:0,incandescent:0}
  const goldenAngle=137.508*(Math.PI/180)
  memNodes.forEach(n=>{
    const nat=computeNature(n.tags)||'vivide'
    const idx=natureIdx[nat]++
    const count=natureCounts[nat]
    const innerR=nat==='permanent'?0:natureR[Object.keys(natureR)[Object.keys(natureR).indexOf(nat)-1]]||0
    const zoneWidth=natureR[nat]-innerR
    // Phyllotaxis within the zone band
    const r=innerR+8+Math.sqrt(idx+1)*12
    const a=idx*goldenAngle
    layoutMemory[n.id]={x:Math.cos(a)*r,y:Math.sin(a)*r}
  })
  // Organs at outer ring
  Object.entries(ORGAN_IDS).forEach(([id,sym])=>{
    const a=ORGAN_ANGLES[sym]
    layoutMemory[id]={x:Math.cos(a)*520,y:Math.sin(a)*520}
  })
  // APEX in Fibonacci spiral
  nodes.filter(n=>n.type==='APEX').forEach((n,i)=>{
    const r=8*Math.sqrt(i+1)
    const a=i*goldenAngle
    layoutMemory[n.id]={x:Math.cos(a)*r,y:Math.sin(a)*r}
  })
}

// ═══════════════════════════════════════════════════════════
// PARTICULES — Flux métabolique le long de l'anneau vital
// ═══════════════════════════════════════════════════════════

function spawnParticles(){
  if(particles.length>100)return
  // Flux métabolique: Σ→Ψ→Φ→Ω→Μ
  for(let i=0;i<ORGAN_ORDER.length;i++){
    if(hashNoise(time*13+i*7)<0.94)continue // probabilité déterministe
    const srcId=ORGAN_ORDER[i], tgtId=ORGAN_ORDER[(i+1)%5]
    const src=layoutHeart[srcId], tgt=layoutHeart[tgtId]
    if(!src||!tgt)continue
    particles.push({
      sx:src.x,sy:src.y,tx:tgt.x,ty:tgt.y,
      t:0, speed:0.006+hashNoise(time+i)*0.008,
      color:ORGAN_COLORS[ORGAN_IDS[srcId]], trail:[]
    })
  }
  // Étincelles de cristallisation: vers Μ
  if(hashNoise(time*37)<0.04){
    const patterns=nodes.filter(n=>n.type==='PATTERN')
    if(patterns.length){
      const p=patterns[Math.floor(hashNoise(time*41)*patterns.length)]
      const pp=layoutHeart[p.id], mp=layoutHeart['or12']
      if(pp&&mp)particles.push({sx:pp.x,sy:pp.y,tx:mp.x,ty:mp.y,t:0,speed:0.012,color:'#a6e3a1',trail:[]})
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]
    p.t+=p.speed
    if(p.t>=1){particles.splice(i,1);continue}
    // Courbe de Bézier via le centre pour le flux
    const cx0=(p.sx+p.tx)/2*0.3, cy0=(p.sy+p.ty)/2*0.3
    const u=1-p.t
    const x=u*u*p.sx+2*u*p.t*cx0+p.t*p.t*p.tx
    const y=u*u*p.sy+2*u*p.t*cy0+p.t*p.t*p.ty
    p.trail.push({x,y})
    if(p.trail.length>12)p.trail.shift()
  }
}

function drawParticles(){
  particles.forEach(p=>{
    const alpha=0.8*(1-Math.abs(p.t-0.5)*2) // plus visible au milieu
    // Trail
    for(let i=0;i<p.trail.length;i++){
      const a=(i/p.trail.length)*alpha*0.4
      ctx.beginPath();ctx.arc(p.trail[i].x,p.trail[i].y,1.5,0,Math.PI*2)
      ctx.fillStyle=p.color;ctx.globalAlpha=a;ctx.fill()
    }
    // Head
    if(p.trail.length){
      const last=p.trail[p.trail.length-1]
      ctx.beginPath();ctx.arc(last.x,last.y,3,0,Math.PI*2)
      ctx.fillStyle=p.color;ctx.globalAlpha=alpha;ctx.fill()
      // Glow
      ctx.beginPath();ctx.arc(last.x,last.y,6,0,Math.PI*2)
      ctx.fillStyle=p.color;ctx.globalAlpha=alpha*0.3;ctx.fill()
    }
    ctx.globalAlpha=1
  })
}

// ═══════════════════════════════════════════════════════════
// RENDU — FORMES SPÉCIFIQUES PAR TYPE
// ═══════════════════════════════════════════════════════════

function drawHex(x,y,r,c){
  ctx.beginPath()
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  ctx.closePath();ctx.fillStyle=c+'cc';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke()
}
function drawOct(x,y,r,c){
  ctx.beginPath()
  for(let i=0;i<8;i++){const a=Math.PI/4*i;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  ctx.closePath();ctx.fillStyle=c+'60';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke()
}
function drawCilia(x,y,angle,r,c){
  // Ligne pointant vers l'extérieur avec petit cercle au bout
  const ex=x+Math.cos(angle)*r, ey=y+Math.sin(angle)*r
  ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(ex,ey)
  ctx.strokeStyle=c+'a0';ctx.lineWidth=1.5;ctx.stroke()
  ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2)
  ctx.fillStyle=c;ctx.fill()
}
function drawHexCell(x,y,r,c){
  // Petite cellule hexagonale (pour PATTERN réseau)
  ctx.beginPath()
  for(let i=0;i<6;i++){const a=Math.PI/3*i;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  ctx.closePath();ctx.fillStyle=c+'50';ctx.fill();ctx.strokeStyle=c+'90';ctx.lineWidth=1;ctx.stroke()
}
function drawSpiralDot(x,y,r,c,angle){
  // Point de spirale Fibonacci avec petite racine
  const rx=Math.cos(angle)*r*0.3, ry=Math.sin(angle)*r*0.3
  ctx.beginPath();ctx.moveTo(x-rx,y-ry);ctx.lineTo(x,y)
  ctx.strokeStyle=c+'60';ctx.lineWidth=1;ctx.stroke()
  ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2)
  ctx.fillStyle=c+'90';ctx.fill()
}

// ═══════════════════════════════════════════════════════════
// RENDU: CŒUR COGNITIF (CELLULE-CORAIL)
// ═══════════════════════════════════════════════════════════

function drawHeart(){
  const cx=0,cy=0
  const pulse=1+Math.sin(time*0.02)*0.015

  // ── Membrane cellulaire (grande enveloppe externe) ──
  const membraneR = VITAL_RING_R + 180
  ctx.beginPath();ctx.arc(cx,cy,membraneR*pulse,0,Math.PI*2)
  ctx.strokeStyle='#1e1e2e';ctx.lineWidth=2;ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([])
  const memGrad=ctx.createRadialGradient(cx,cy,membraneR-20,cx,cy,membraneR+20)
  memGrad.addColorStop(0,'rgba(17,17,27,0.1)');memGrad.addColorStop(1,'rgba(10,10,15,0.3)')
  ctx.beginPath();ctx.arc(cx,cy,membraneR+20,0,Math.PI*2);ctx.fillStyle=memGrad;ctx.fill()

  // ── Anneau vital (épais, vivant) ──
  ctx.beginPath();ctx.arc(cx,cy,VITAL_RING_R*pulse,0,Math.PI*2)
  ctx.strokeStyle='#1e1e2e';ctx.lineWidth=50;ctx.stroke()

  // ── Segments colorés de l'anneau ──
  for(let i=0;i<5;i++){
    const a0=ORGAN_ANGLES[['Σ','Ψ','Φ','Ω','Μ'][i]]
    const a1=ORGAN_ANGLES[['Σ','Ψ','Φ','Ω','Μ'][(i+1)%5]]
    const dash=time*0.03+i*0.5
    ctx.beginPath();ctx.arc(cx,cy,VITAL_RING_R*pulse,a0,a1,false)
    ctx.strokeStyle=ORGAN_COLORS[['Σ','Ψ','Φ','Ω','Μ'][i]]+'50'
    ctx.lineWidth=6;ctx.setLineDash([10,14]);ctx.lineDashOffset=-dash*25;ctx.stroke();ctx.setLineDash([])
  }

  // ── Noyau (noyau cellulaire avec ADN) ──
  const nucGrad=ctx.createRadialGradient(cx,cy,0,cx,cy,NUCLEUS_R+30)
  nucGrad.addColorStop(0,'rgba(243,139,168,0.08)');nucGrad.addColorStop(0.7,'rgba(203,166,247,0.04)');nucGrad.addColorStop(1,'rgba(10,10,15,0)')
  ctx.beginPath();ctx.arc(cx,cy,NUCLEUS_R+30,0,Math.PI*2);ctx.fillStyle=nucGrad;ctx.fill()
  // Enveloppe nucléaire
  ctx.beginPath();ctx.arc(cx,cy,NUCLEUS_R*pulse,0,Math.PI*2)
  ctx.strokeStyle='#f38ba830';ctx.lineWidth=1.5;ctx.setLineDash([3,5]);ctx.stroke();ctx.setLineDash([])

  // ── Lignes de connexion (arêtes Bézier) ──
  edges.forEach(e=>{
    const sp=layoutHeart[e.source], tp=layoutHeart[e.target]
    if(!sp||!tp)return
    // Bézier courbé vers le centre
    const mx=(sp.x+tp.x)/2, my=(sp.y+tp.y)/2
    const cpx=mx*0.2, cpy=my*0.2 // point de contrôle vers le centre
    ctx.beginPath();ctx.moveTo(sp.x,sp.y)
    ctx.quadraticCurveTo(cpx,cpy,tp.x,tp.y)
    ctx.strokeStyle=(EDGE_COLORS[e.type]||'#45475a')+'15'
    ctx.lineWidth=0.5;ctx.stroke()
  })

  // ── DRIFT: orbites animées (pathogènes) ──
  nodes.filter(n=>n.type==='DRIFT').forEach(n=>{
    const p=layoutHeart[n.id];if(!p||!p._baseA)return
    const speed=0.002+hashNoise(n.id.charCodeAt(0))*0.003
    const a=p._baseA+time*speed*(hashNoise(n.id.charCodeAt(1))>0.5?1:-1)
    const x=cx+Math.cos(a)*p._orbitR
    const y=cy+Math.sin(a)*p._orbitR
    // Orbite trace
    ctx.beginPath();ctx.arc(cx,cy,p._orbitR,0,Math.PI*2)
    ctx.strokeStyle='#f38ba808';ctx.lineWidth=0.5;ctx.stroke()
    // Point animé
    const fl=0.5+Math.sin(time*0.08+n.id.charCodeAt(2))*0.3
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2)
    ctx.fillStyle='#f38ba8';ctx.globalAlpha=fl;ctx.fill()
    ctx.beginPath();ctx.arc(x,y,9,0,Math.PI*2)
    ctx.fillStyle='#f38ba8';ctx.globalAlpha=fl*0.2;ctx.fill()
    ctx.globalAlpha=1
    // Mise à jour position pour hover
    layoutHeart[n.id]._animX=x;layoutHeart[n.id]._animY=y
  })

  // ── RENDU PAR TYPE ──

  // APEX: double hélice (octogones dans le noyau)
  nodes.filter(n=>n.type==='APEX').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS.APEX
    drawOct(p.x,p.y,r,c)
    // Label court
    ctx.fillStyle='#cdd6f4';ctx.font='bold 5px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
    const roman=n.label.substring(0,2)
    ctx.fillText(roman,p.x,p.y)
  })

  // REGLE: dendrites (petits cercles avec fil vers le parent)
  nodes.filter(n=>n.type==='REGLE').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS.REGLE
    // Fil vers Ψ
    const psiPos=layoutHeart['or9']
    if(psiPos){
      ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(psiPos.x,psiPos.y)
      ctx.strokeStyle='#fab38720';ctx.lineWidth=0.5;ctx.stroke()
    }
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=c+'90';ctx.fill()
    // Point central (noyau de dendrite)
    ctx.beginPath();ctx.arc(p.x,p.y,1.5,0,Math.PI*2)
    ctx.fillStyle=c;ctx.fill()
  })

  // COMMANDE: cils (lignes radiales avec bout)
  nodes.filter(n=>n.type==='COMMANDE').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const angle=Math.atan2(p.y,p.x) // angle vers l'extérieur
    drawCilia(p.x,p.y,angle,16,NODE_COLORS.COMMANDE)
  })

  // PROTOCOLE: arcs de Golgi (petits rectangles arrondis)
  nodes.filter(n=>n.type==='PROTOCOLE').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const c=NODE_COLORS.PROTOCOLE
    ctx.beginPath()
    const w=12,h=6
    if(ctx.roundRect){ctx.roundRect(p.x-w/2,p.y-h/2,w,h,2)}
    else{ctx.rect(p.x-w/2,p.y-h/2,w,h)}
    ctx.fillStyle=c+'70';ctx.fill();ctx.strokeStyle=c+'c0';ctx.lineWidth=1;ctx.stroke()
  })

  // OUTIL: pseudopodes (formes organiques)
  nodes.filter(n=>n.type==='OUTIL').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS.OUTIL
    // Ovale (plus large que haut)
    ctx.beginPath();ctx.ellipse(p.x,p.y,r*1.3,r*0.8,0,0,Math.PI*2)
    ctx.fillStyle=c+'80';ctx.fill();ctx.strokeStyle=c+'b0';ctx.lineWidth=1;ctx.stroke()
  })

  // MUTATION: croûte sur l'anneau (écailles colorées par statut)
  nodes.filter(n=>n.type==='MUTATION').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n)
    let c=NODE_COLORS.MUTATION
    let borderC=c
    if(n.tags.includes('applied')){c='#a6e3a1';borderC='#a6e3a1'}
    else if(n.tags.includes('rejected')){c='#f38ba8';borderC='#f38ba8'}
    else if(n.tags.includes('rolled_back')){c='#fab387';borderC='#fab387'}
    // Écaille (trapèze arrondi)
    const angle=Math.atan2(p.y,p.x)
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=c+'80';ctx.fill();ctx.strokeStyle=borderC;ctx.lineWidth=1.2;ctx.stroke()
  })

  // PATTERN: réseau hexagonal (cellules cristallines)
  nodes.filter(n=>n.type==='PATTERN').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const c=NODE_COLORS.PATTERN
    drawHexCell(p.x,p.y,8,c)
  })

  // MEMOIRE: spirale Fibonacci (perles avec racine)
  nodes.filter(n=>n.type==='MEMOIRE').forEach((n,i)=>{
    const p=layoutHeart[n.id];if(!p)return
    const c=NODE_COLORS.MEMOIRE
    const goldenAngle=137.508*(Math.PI/180)
    drawSpiralDot(p.x,p.y,5,c,i*goldenAngle)
  })

  // ORGANS: hexagones (dernier pour être au-dessus)
  nodes.filter(n=>n.type==='ORGAN').forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n), c=ORGAN_COLORS[ORGAN_IDS[n.id]]
    const isHover=hoverNode===n.id
    // Glow organique
    const g=ctx.createRadialGradient(p.x,p.y,r,p.x,p.y,r+(isHover?30:20))
    g.addColorStop(0,c+(isHover?'50':'30'));g.addColorStop(1,c+'00')
    ctx.beginPath();ctx.arc(p.x,p.y,r+(isHover?30:20),0,Math.PI*2);ctx.fillStyle=g;ctx.fill()
    drawHex(p.x,p.y,r,c)
    const sym=ORGAN_IDS[n.id]
    ctx.fillStyle='#cdd6f4';ctx.font='bold 18px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.fillText(sym,p.x,p.y)
  })

  // ── Particules ──
  spawnParticles();updateParticles();drawParticles()

  // ── Labels organelles ──
  ctx.fillStyle='#6c708680';ctx.font='8px JetBrains Mono';ctx.textAlign='center'
  const labels=[
    {id:'or8',label:'PERCEPTION'},{id:'or9',label:'MÉTACOGNITION'},{id:'or10',label:'AUDIT RÉEL'},
    {id:'or11',label:'SYNTHÈSE'},{id:'or12',label:'MÉMOIRE'}
  ]
  labels.forEach(l=>{
    const p=layoutHeart[l.id];if(!p)return
    const a=Math.atan2(p.y,p.x)
    ctx.fillText(l.label,p.x+Math.cos(a)*50,p.y+Math.sin(a)*50)
  })
}

// ═══════════════════════════════════════════════════════════
// RENDU: TIMELINE
// ═══════════════════════════════════════════════════════════

function drawTimeline(){
  const laneOrder=['ORGAN','APEX','REGLE','COMMANDE','OUTIL','PROTOCOLE','MUTATION','PATTERN','MEMOIRE','DRIFT']
  const laneH=60
  ctx.font='10px JetBrains Mono';ctx.textAlign='right';ctx.textBaseline='middle'
  laneOrder.forEach((t,i)=>{
    const y=-300+i*laneH
    ctx.fillStyle=NODE_COLORS[t]+'80'
    ctx.fillText(t,-420,y)
    ctx.beginPath();ctx.moveTo(-410,y);ctx.lineTo(2000,y)
    ctx.strokeStyle='#1e1e2e';ctx.lineWidth=1;ctx.stroke()
  })
  // Nodes
  nodes.forEach(n=>{
    const p=layoutTimeline[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS[n.type]||'#6c7086'
    const isHover=hoverNode===n.id
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=c+(isHover?'ff':'90');ctx.fill()
    if(n.type==='MUTATION'){
      if(n.tags.includes('applied')){ctx.strokeStyle='#a6e3a180';ctx.lineWidth=1;ctx.stroke()}
      if(n.tags.includes('rejected')){ctx.strokeStyle='#f38ba880';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([])}
      if(n.tags.includes('rolled_back')){ctx.strokeStyle='#fab38780';ctx.lineWidth=1;ctx.stroke()}
    }
  })
}

// ═══════════════════════════════════════════════════════════
// RENDU: ÉCOSYSTÈME MÉMOIRE
// ═══════════════════════════════════════════════════════════

function drawMemory(){
  const natureR={permanent:80,vivide:180,volatile:300,incandescent:420}
  const natureLabels={permanent:'PERMANENT (scellé)',vivide:'VIVIDE (actif)',volatile:'VOLATILE (incubation)',incandescent:'INCANDESCENT (braises)'}
  Object.entries(natureR).forEach(([nat,r])=>{
    const c=NATURE_COLORS[nat]
    const pulse=1+Math.sin(time*0.015+Object.keys(natureR).indexOf(nat))*0.01
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2)
    ctx.strokeStyle=c+'40';ctx.lineWidth=nat==='incandescent'?3:1
    ctx.setLineDash(nat==='volatile'?[6,4]:[]);ctx.stroke();ctx.setLineDash([])
    const innerR=nat==='permanent'?0:natureR[Object.keys(natureR)[Object.keys(natureR).indexOf(nat)-1]]||0
    const g=ctx.createRadialGradient(0,0,innerR,0,0,r)
    g.addColorStop(0,c+'05');g.addColorStop(1,c+'08')
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()
    ctx.fillStyle=c+'90';ctx.font='bold 9px JetBrains Mono';ctx.textAlign='center'
    ctx.fillText(natureLabels[nat],0,-r-8)
  })
  ctx.fillStyle='#cba6f790';ctx.font='bold 8px JetBrains Mono';ctx.textAlign='center'
  ctx.fillText('MCP TOOLS',0,-2)
  // Nodes
  nodes.forEach(n=>{
    const p=layoutMemory[n.id];if(!p)return
    const r=n.type==='OUTIL'?8:computeRadius(n)
    const c=NODE_COLORS[n.type]||'#6c7086'
    const nat=computeNature(n.tags)
    const isHover=hoverNode===n.id
    if(nat&&NATURE_COLORS[nat]){
      const ng=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r+6)
      ng.addColorStop(0,NATURE_COLORS[nat]+'30');ng.addColorStop(1,NATURE_COLORS[nat]+'00')
      ctx.beginPath();ctx.arc(p.x,p.y,r+6,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill()
    }
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=(nat?NATURE_COLORS[nat]:c)+(isHover?'ff':'a0');ctx.fill()
    if(n.type==='OUTIL'&&n.tags.includes('mnemolite')){ctx.strokeStyle='#cba6f7';ctx.lineWidth=1.5;ctx.stroke()}
    if(nat==='incandescent'){
      const fl=0.3+Math.sin(time*0.08+p.x)*0.3
      ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2)
      ctx.fillStyle='#f38ba8'+Math.floor(fl*60).toString(16).padStart(2,'0');ctx.fill()
    }
  })
  Object.entries(ORGAN_IDS).forEach(([id,sym])=>{
    const p=layoutMemory[id];if(!p)return
    drawHex(p.x,p.y,20,ORGAN_COLORS[sym])
    ctx.fillStyle='#cdd6f4';ctx.font='bold 14px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.fillText(sym,p.x,p.y)
  })
}

// ═══════════════════════════════════════════════════════════
// BOUCLE PRINCIPALE
// ═══════════════════════════════════════════════════════════

function loop(){
  time++
  ctx.clearRect(0,0,C.width,C.height)
  ctx.save()
  ctx.translate(C.width/2,C.height/2)
  ctx.scale(cam.z,cam.z)
  ctx.translate(cam.x,cam.y)

  if(mode==='heart')drawHeart()
  else if(mode==='timeline')drawTimeline()
  else if(mode==='memory')drawMemory()

  ctx.restore()
  requestAnimationFrame(loop)
}

// ═══════════════════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════════════════

C.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y}})
C.addEventListener('mousemove',e=>{
  if(drag){cam.x=drag.cx+(e.clientX-drag.x)/cam.z;cam.y=drag.cy+(e.clientY-drag.y)/cam.z}
  const mx=(e.clientX-C.width/2)/cam.z-cam.x
  const my=(e.clientY-C.height/2)/cam.z-cam.y
  const layout=mode==='heart'?layoutHeart:mode==='timeline'?layoutTimeline:layoutMemory
  hoverNode=null
  for(const n of nodes){
    let p=layout[n.id];if(!p)continue
    // Pour DRIFT animé, utiliser la position animée
    if(n.type==='DRIFT'&&p._animX!==undefined){p={x:p._animX,y:p._animY}}
    const r=computeRadius(n)+4
    if(Math.abs(mx-p.x)<r&&Math.abs(my-p.y)<r){hoverNode=n.id;break}
  }
  const tt=document.getElementById('tooltip')
  if(hoverNode){
    const n=nodes.find(m=>m.id===hoverNode)
    tt.style.display='block';tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY+12)+'px'
    tt.innerHTML=`<div class="tt-label">${n.label}</div><div class="tt-content">${n.content||''}</div><div class="tt-tags">${n.tags.map(t=>`<span class="tt-tag">${t}</span>`).join('')}</div>`
  }else{tt.style.display='none'}
})
C.addEventListener('mouseup',()=>{drag=null})
C.addEventListener('wheel',e=>{
  e.preventDefault()
  cam.z*=e.deltaY>0?0.92:1.08
  cam.z=Math.max(0.15,Math.min(5,cam.z))
},{passive:false})

// ─── Mode switch ───
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    mode=btn.dataset.mode
    cam={x:0,y:0,z:mode==='timeline'?0.5:0.7}
    hoverNode=null;particles=[]
    document.getElementById('nature-legend').style.display=mode==='memory'?'block':'none'
    updateLegend();updateStats()
  })
})

// ─── HUD ───
function updateLegend(){
  const lg=document.getElementById('legend')
  if(mode==='memory'){
    lg.innerHTML=Object.entries(NATURE_COLORS).map(([k,v])=>
      `<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k}</div>`).join('')
  }else if(mode==='heart'){
    lg.innerHTML=
      `<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Signatures géométriques</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#f38ba8"></div>APEX — Hélice ADN</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#fab387"></div>REGLE — Dendrites</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#89dceb"></div>COMMANDE — Cils</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#f9e2af"></div>PROTOCOLE — Golgi</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#cba6f7"></div>OUTIL — Pseudopodes</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#a6e3a1"></div>PATTERN — Cristaux hex</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#89b4fa"></div>MEMOIRE — Fibonacci</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#eba0ac"></div>MUTATION — Croûte</div>`+
      `<div class="legend-row"><div class="legend-dot" style="background:#f38ba8"></div>DRIFT — Orbites</div>`
  }else{
    lg.innerHTML=Object.entries(NODE_COLORS).map(([k,v])=>
      `<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k}</div>`).join('')
  }
  const nl=document.getElementById('nature-legend')
  nl.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Natures Mnemolite</div>`+
    Object.entries(NATURE_COLORS).map(([k,v])=>{
      const desc={permanent:'Scellé, immuable',vivide:'Actif, validé',volatile:'En incubation',incandescent:'Braises à consumer'}[k]
      return`<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k} — ${desc}</div>`
    }).join('')
}

function updateStats(){
  const st=document.getElementById('stats')
  if(mode==='memory'){
    const memNodes=nodes.filter(n=>n.type==='MEMOIRE'||n.type==='PATTERN'||n.type==='DRIFT'||n.type==='MUTATION')
    const counts={permanent:0,vivide:0,volatile:0,incandescent:0}
    memNodes.forEach(n=>{const nat=computeNature(n.tags)||'vivide';counts[nat]++})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Écosystème Mémoire</div>`+
      `<div><span class="val blue">${counts.permanent}</span> permanent</div>`+
      `<div><span class="val green">${counts.vivide}</span> vivide</div>`+
      `<div><span class="val yellow">${counts.volatile}</span> volatile</div>`+
      `<div><span class="val red">${counts.incandescent}</span> incandescent</div>`+
      `<div style="margin-top:6px;color:#6c7086">${memNodes.length} nœuds mémoire</div>`
  }else if(mode==='timeline'){
    const byType={}
    nodes.forEach(n=>{byType[n.type]=(byType[n.type]||0)+1})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Timeline</div>`+
      Object.entries(byType).map(([k,v])=>`<div><span class="val">${v}</span> ${k}</div>`).join('')
  }else{
    const byType={}
    nodes.forEach(n=>{byType[n.type]=(byType[n.type]||0)+1})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">🧬 Cellule-Corail</div>`+
      `<div><span class="val">${nodes.length}</span> nœuds · <span class="val">${edges.length}</span> arêtes</div>`+
      `<div style="margin-top:6px;color:#6c7086">Zéro random — croissance déterministe</div>`+
      Object.entries(byType).slice(0,5).map(([k,v])=>`<div><span class="val">${v}</span> ${k}</div>`).join('')
  }
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
(function initData(){
  nodes=GRAPH_DATA.nodes;edges=GRAPH_DATA.edges
  computeLayouts()
  document.getElementById('node-count').textContent=`${nodes.length} nœuds · ${edges.length} arêtes`
  updateLegend();updateStats()
  requestAnimationFrame(loop)
})()
</script>
</body>
