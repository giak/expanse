// ─── Compute nature from tags ───
function computeNature(tags){
  const t=tags.join(' ')
  if(t.includes('sys:core')||t.includes('sys:anchor')||t.includes('sys:snapshot'))return'permanent'
  if(t.includes('trace:fresh')||t.includes('sys:drift'))return'incandescent'
  if(t.includes('sys:pattern:candidate')||t.includes('sys:extension')||t.includes('sys:pattern:doubt'))return'volatile'
  if(t.includes('sys:pattern')||t.includes('sys:history')||t.includes('sys:protocol'))return'vivide'
  if(t.includes('memoire'))return'vivide'
  if(t.includes('mutation')&&t.includes('applied'))return'vivide'
  if(t.includes('mutation')&&t.includes('rejected'))return'incandescent'
  if(t.includes('mutation')&&t.includes('rolled_back'))return'incandescent'
  if(t.includes('drift'))return'incandescent'
  return null
}

// ─── Compute radius from centrality ───
function computeRadius(n){
  if(n.type==='ORGAN')return 30
  if(n.type==='APEX')return 12+Math.min(n.centrality,20)*0.6
  return 6+Math.min(n.centrality,10)*0.4
}

// ─── Layouts ───
let layoutHeart={}, layoutTimeline={}, layoutMemory={}

function computeLayouts(){
  // Heart: anatomical radial
  const cx=0,cy=0
  nodes.forEach(n=>{
    if(n.type==='ORGAN'){
      const sym=ORGAN_IDS[n.id]
      const a=ORGAN_ANGLES[sym]||0
      layoutHeart[n.id]={x:cx+Math.cos(a)*VITAL_RING_R,y:cy+Math.sin(a)*VITAL_RING_R}
    }else if(n.type==='APEX'){
      const idx=nodes.filter(m=>m.type==='APEX').indexOf(n)
      const a=(idx/7)*Math.PI*2
      const r=20+Math.random()*30
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='MUTATION'){
      const a=(nodes.filter(m=>m.type==='MUTATION').indexOf(n)/38)*Math.PI*2
      const r=120+Math.random()*50
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='DRIFT'){
      const a=Math.random()*Math.PI*2
      const r=VITAL_RING_R+150+Math.random()*120
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='PATTERN'){
      const oa=ORGAN_ANGLES['Ω']
      const idx=nodes.filter(m=>m.type==='PATTERN').indexOf(n)
      const a=oa-0.5+(idx/24)*1.0
      const r=VITAL_RING_R+50+Math.random()*60
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='MEMOIRE'){
      const oa=ORGAN_ANGLES['Μ']
      const idx=nodes.filter(m=>m.type==='MEMOIRE').indexOf(n)
      const a=oa-0.4+(idx/12)*0.8
      const r=VITAL_RING_R+40+Math.random()*60
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='REGLE'){
      const oa=ORGAN_ANGLES['Ψ']
      const idx=nodes.filter(m=>m.type==='REGLE').indexOf(n)
      const a=oa-0.8+(idx/30)*1.6
      const r=VITAL_RING_R+30+Math.random()*80
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='COMMANDE'){
      const oa=ORGAN_ANGLES['Ψ']
      const idx=nodes.filter(m=>m.type==='COMMANDE').indexOf(n)
      const a=oa-0.3+(idx/14)*0.6
      const r=VITAL_RING_R+60+Math.random()*40
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='PROTOCOLE'){
      const oa=ORGAN_ANGLES['Ψ']
      const idx=nodes.filter(m=>m.type==='PROTOCOLE').indexOf(n)
      const a=oa+0.3+(idx/8)*0.6
      const r=VITAL_RING_R+30+Math.random()*40
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else if(n.type==='OUTIL'){
      const oa=ORGAN_ANGLES['Φ']
      const idx=nodes.filter(m=>m.type==='OUTIL').indexOf(n)
      const a=oa-0.6+(idx/18)*1.2
      const r=VITAL_RING_R+40+Math.random()*60
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }else{
      const a=Math.random()*Math.PI*2
      const r=200+Math.random()*200
      layoutHeart[n.id]={x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
    }
  })

  // Timeline: sort by created_at, lanes by type
  const sorted=[...nodes].filter(n=>n.created_at&&!n.created_at.startsWith('2026-04-14T06:50')).sort((a,b)=>{
    const da=new Date(a.created_at),db=new Date(b.created_at)
    return da-db
  })
  const laneOrder=['ORGAN','APEX','REGLE','COMMANDE','OUTIL','PROTOCOLE','MUTATION','PATTERN','MEMOIRE','DRIFT']
  const laneH=60,xSpacing=30,xStart=-400
  sorted.forEach((n,i)=>{
    const lane=laneOrder.indexOf(n.type)
    layoutTimeline[n.id]={x:xStart+i*xSpacing,y:-300+lane*laneH}
  })

  // Memory: concentric by nature
  const natureOrder={permanent:0,vivide:1,volatile:2,incandescent:3}
  const natureR={permanent:80,vivide:180,volatile:300,incandescent:420}
  const natureCounts={permanent:0,vivide:0,volatile:0,incandescent:0}
  // MCP tools at center
  const tools=nodes.filter(n=>n.type==='OUTIL'&&n.tags.includes('mnemolite'))
  tools.forEach((t,i)=>{
    const a=(i/tools.length)*Math.PI*2
    layoutMemory[t.id]={x:Math.cos(a)*35,y:Math.sin(a)*35}
  })
  // Memory nodes by nature
  const memNodes=nodes.filter(n=>n.type==='MEMOIRE'||n.type==='PATTERN'||n.type==='DRIFT'||n.type==='MUTATION')
  memNodes.forEach(n=>{
    const nat=computeNature(n.tags)||'vivide'
    natureCounts[nat]++
  })
  const natureIdx={permanent:0,vivide:0,volatile:0,incandescent:0}
  memNodes.forEach(n=>{
    const nat=computeNature(n.tags)||'vivide'
    const count=natureCounts[nat]
    const idx=natureIdx[nat]++
    const r=natureR[nat]
    const a=(idx/count)*Math.PI*2
    const jitter=(Math.random()-0.5)*r*0.3
    layoutMemory[n.id]={x:Math.cos(a)*(r+jitter),y:Math.sin(a)*(r+jitter)}
  })
  // Organs at outer ring
  Object.entries(ORGAN_IDS).forEach(([id,sym])=>{
    const a=ORGAN_ANGLES[sym]
    layoutMemory[id]={x:Math.cos(a)*520,y:Math.sin(a)*520}
  })
  // APEX between organs and center
  nodes.filter(n=>n.type==='APEX').forEach((n,i)=>{
    const a=(i/7)*Math.PI*2
    layoutMemory[n.id]={x:Math.cos(a)*480,y:Math.sin(a)*480}
  })
}

// ─── Particles ───
function spawnParticles(){
  if(particles.length>120)return
  // Metabolic flow along vital ring
  const organNodes=nodes.filter(n=>n.type==='ORGAN')
  const orgOrder=['or8','or9','or10','or11','or12']
  for(let i=0;i<orgOrder.length;i++){
    if(Math.random()>0.03)continue
    const src=layoutHeart[orgOrder[i]],tgt=layoutHeart[orgOrder[(i+1)%5]]
    if(!src||!tgt)continue
    particles.push({sx:src.x,sy:src.y,tx:tgt.x,ty:tgt.y,t:0,speed:0.005+Math.random()*0.01,
      color:ORGAN_COLORS[ORGAN_IDS[orgOrder[i]]],trail:[]})
  }
  // Drift sparks
  if(Math.random()>0.97){
    const dr=nodes.filter(n=>n.type==='DRIFT')
    if(dr.length){
      const d=dr[Math.floor(Math.random()*dr.length)]
      const p=layoutHeart[d.id]
      if(p)particles.push({sx:p.x,sy:p.y,tx:p.x+20,ty:p.y+20,t:0,speed:0.04,
        color:'#f38ba8',trail:[],spark:true})
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]
    p.t+=p.speed
    if(p.t>=1){particles.splice(i,1);continue}
    p.trail.push({x:p.sx+(p.tx-p.sx)*p.t,y:p.sy+(p.ty-p.sy)*p.t})
    if(p.trail.length>8)p.trail.shift()
  }
}

function drawParticles(){
  particles.forEach(p=>{
    const alpha=p.spark?(1-p.t):0.7
    // Trail
    for(let i=0;i<p.trail.length;i++){
      const a=(i/p.trail.length)*alpha*0.5
      ctx.beginPath()
      ctx.arc(p.trail[i].x,p.trail[i].y,2,0,Math.PI*2)
      ctx.fillStyle=p.color+Math.floor(a*255).toString(16).padStart(2,'0')
      ctx.fill()
    }
    // Head
    const hx=p.sx+(p.tx-p.sx)*p.t, hy=p.sy+(p.ty-p.sy)*p.t
    ctx.beginPath();ctx.arc(hx,hy,3,0,Math.PI*2)
    ctx.fillStyle=p.color;ctx.globalAlpha=alpha;ctx.fill();ctx.globalAlpha=1
  })
}

// ─── Render: Heart ───
function drawHeart(){
  const cx=0,cy=0
  // Vital ring (pulsing)
  const pulse=1+Math.sin(time*0.02)*0.02
  ctx.beginPath();ctx.arc(cx,cy,VITAL_RING_R*pulse,0,Math.PI*2)
  ctx.strokeStyle='#1e1e2e';ctx.lineWidth=60;ctx.stroke()
  // Animated ring segments
  const segs=5
  for(let i=0;i<segs;i++){
    const a0=ORGAN_ANGLES[['Σ','Ψ','Φ','Ω','Μ'][i]]
    const a1=ORGAN_ANGLES[['Σ','Ψ','Φ','Ω','Μ'][(i+1)%5]]
    const dash=time*0.03+i*0.5
    ctx.beginPath()
    ctx.arc(cx,cy,VITAL_RING_R*pulse,a0,a1,false)
    ctx.strokeStyle=ORGAN_COLORS[['Σ','Ψ','Φ','Ω','Μ'][i]]+'60'
    ctx.lineWidth=4;ctx.setLineDash([8,12]);ctx.lineDashOffset=-dash*20;ctx.stroke()
    ctx.setLineDash([])
  }
  // Nucleus glow
  const nucGlow=8+Math.sin(time*0.03)*3
  const grad=ctx.createRadialGradient(cx,cy,0,cx,cy,NUCLEUS_R+20)
  grad.addColorStop(0,'rgba(243,139,168,0.15)');grad.addColorStop(1,'rgba(243,139,168,0)')
  ctx.beginPath();ctx.arc(cx,cy,NUCLEUS_R+20,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill()
  // Edges (faint)
  edges.forEach(e=>{
    const sp=layoutHeart[e.source],tp=layoutHeart[e.target]
    if(!sp||!tp)return
    ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y)
    ctx.strokeStyle=(EDGE_COLORS[e.type]||'#45475a')+'18'
    ctx.lineWidth=0.5;ctx.stroke()
  })
  // Nodes
  nodes.forEach(n=>{
    const p=layoutHeart[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS[n.type]||'#6c7086'
    const isHover=hoverNode===n.id
    const isOrgan=n.type==='ORGAN'
    // Glow
    if(isOrgan||isHover){
      const g=ctx.createRadialGradient(p.x,p.y,r,p.x,p.y,r+(isOrgan?20:10))
      g.addColorStop(0,c+'40');g.addColorStop(1,c+'00')
      ctx.beginPath();ctx.arc(p.x,p.y,r+(isOrgan?20:10),0,Math.PI*2);ctx.fillStyle=g;ctx.fill()
    }
    // Organ hexagon
    if(isOrgan){
      drawHex(p.x,p.y,r,c)
      const sym=ORGAN_IDS[n.id]
      ctx.fillStyle='#cdd6f4';ctx.font='bold 18px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
      ctx.fillText(sym,p.x,p.y)
    }else if(n.type==='APEX'){
      drawOct(p.x,p.y,r,c)
      ctx.fillStyle='#cdd6f4';ctx.font='bold 6px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
      ctx.fillText(n.label.substring(0,6),p.x,p.y+r+10)
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
      ctx.fillStyle=c+(isHover?'ff':'80');ctx.fill()
      if(n.type==='MUTATION'&&n.tags.includes('rejected')){ctx.strokeStyle='#f38ba880';ctx.lineWidth=1;ctx.stroke()}
      if(n.type==='MUTATION'&&n.tags.includes('rolled_back')){ctx.strokeStyle='#fab38780';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([])}
      if(n.type==='DRIFT'){
        const fl=0.5+Math.sin(time*0.1+Math.random())*0.5
        ctx.beginPath();ctx.arc(p.x,p.y,r+3,0,Math.PI*2)
        ctx.fillStyle='#f38ba8'+Math.floor(fl*80).toString(16).padStart(2,'0');ctx.fill()
      }
    }
  })
  // Particles
  spawnParticles();updateParticles();drawParticles()
}

function drawHex(x,y,r,c){
  ctx.beginPath()
  for(let i=0;i<6;i++){const a=Math.PI/3*i-Math.PI/6;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  ctx.closePath();ctx.fillStyle=c+'cc';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=2;ctx.stroke()
}
function drawOct(x,y,r,c){
  ctx.beginPath()
  for(let i=0;i<8;i++){const a=Math.PI/4*i;ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r)}
  ctx.closePath();ctx.fillStyle=c+'90';ctx.fill();ctx.strokeStyle=c;ctx.lineWidth=1.5;ctx.stroke()
}

// ─── Render: Timeline ───
function drawTimeline(){
  const laneOrder=['ORGAN','APEX','REGLE','COMMANDE','OUTIL','PROTOCOLE','MUTATION','PATTERN','MEMOIRE','DRIFT']
  const laneH=60
  // Lane labels
  ctx.font='10px JetBrains Mono';ctx.textAlign='right';ctx.textBaseline='middle'
  laneOrder.forEach((t,i)=>{
    const y=-300+i*laneH
    ctx.fillStyle=NODE_COLORS[t]+'80'
    ctx.fillText(t,-420,y)
    // Lane line
    ctx.beginPath();ctx.moveTo(-410,y);ctx.lineTo(2000,y)
    ctx.strokeStyle='#1e1e2e';ctx.lineWidth=1;ctx.stroke()
  })
  // Time axis
  const sorted=[...nodes].filter(n=>layoutTimeline[n.id]).sort((a,b)=>{
    return new Date(a.created_at)-new Date(b.created_at)
  })
  if(sorted.length){
    const d0=new Date(sorted[0].created_at), d1=new Date(sorted[sorted.length-1].created_at)
    const span=d1-d0||1
    // Date labels
    ctx.textAlign='center';ctx.fillStyle='#6c7086';ctx.font='9px JetBrains Mono'
    const months=['Mar 13','Mar 19','Mar 20','Mar 21','Mar 23','Mar 24','Apr 6']
    months.forEach(m=>{
      const d=new Date('2026-'+m.replace(/ /,'-'))
      const frac=(d-d0)/span
      const x=-400+frac*sorted.length*30
      ctx.fillText(m,x,-330)
      ctx.beginPath();ctx.moveTo(x,-320);ctx.lineTo(x,300)
      ctx.strokeStyle='#1e1e2e';ctx.lineWidth=1;ctx.stroke()
    })
  }
  // Edges (faint, only DERIVES_FROM and ALTERS)
  edges.forEach(e=>{
    if(e.type!=='ALTERS'&&e.type!=='DERIVES_FROM')return
    const sp=layoutTimeline[e.source],tp=layoutTimeline[e.target]
    if(!sp||!tp)return
    ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y)
    ctx.strokeStyle=(EDGE_COLORS[e.type]||'#45475a')+'25'
    ctx.lineWidth=0.5;ctx.stroke()
  })
  // Nodes
  nodes.forEach(n=>{
    const p=layoutTimeline[n.id];if(!p)return
    const r=computeRadius(n), c=NODE_COLORS[n.type]||'#6c7086'
    const isHover=hoverNode===n.id
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=c+(isHover?'ff':'90');ctx.fill()
    if(n.type==='MUTATION'){
      if(n.tags.includes('applied')){ctx.strokeStyle='#a6e3a180';ctx.lineWidth=1;ctx.stroke()}
      if(n.tags.includes('rejected')){ctx.strokeStyle='#f38ba880';ctx.lineWidth=1;ctx.setLineDash([2,2]);ctx.stroke();ctx.setLineDash([])}
      if(n.tags.includes('rolled_back')){ctx.strokeStyle='#fab38780';ctx.lineWidth=1;ctx.stroke()}
    }
  })
}

// ─── Render: Memory Ecosystem ───
function drawMemory(){
  const natureR={permanent:80,vivide:180,volatile:300,incandescent:420}
  const natureLabels={permanent:'PERMANENT (scellé)',vivide:'VIVIDE (actif)',volatile:'VOLATILE (incubation)',incandescent:'INCANDESCENT (braises)'}
  // Nature zones
  Object.entries(natureR).forEach(([nat,r])=>{
    const c=NATURE_COLORS[nat]
    // Zone circle
    const pulse=1+Math.sin(time*0.015+Object.keys(natureR).indexOf(nat))*0.01
    ctx.beginPath();ctx.arc(0,0,r*pulse,0,Math.PI*2)
    ctx.strokeStyle=c+'40';ctx.lineWidth=nat==='incandescent'?3:1
    ctx.setLineDash(nat==='volatile'?[6,4]:[]);ctx.stroke();ctx.setLineDash([])
    // Zone fill
    const innerR=nat==='permanent'?0:natureR[Object.keys(natureR)[Object.keys(natureR).indexOf(nat)-1]]||0
    const g=ctx.createRadialGradient(0,0,innerR,0,0,r)
    g.addColorStop(0,c+'05');g.addColorStop(1,c+'08')
    ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill()
    // Zone label
    ctx.fillStyle=c+'90';ctx.font='bold 9px JetBrains Mono';ctx.textAlign='center'
    ctx.fillText(natureLabels[nat],0,-r-8)
  })
  // Center label
  ctx.fillStyle='#cba6f790';ctx.font='bold 8px JetBrains Mono';ctx.textAlign='center'
  ctx.fillText('MCP TOOLS',0,-2)
  // Edges (tag roots - faint)
  const memNodes=nodes.filter(n=>layoutMemory[n.id]&&(n.type==='MEMOIRE'||n.type==='PATTERN'||n.type==='DRIFT'||n.type==='MUTATION'))
  const tagMap={}
  memNodes.forEach(n=>{n.tags.forEach(t=>{if(!tagMap[t])tagMap[t]=[];tagMap[t].push(n.id)})})
  // Draw edges between nodes sharing a tag (limit to most common tags)
  const commonTags=Object.entries(tagMap).filter(([t,ids])=>ids.length>1&&ids.length<8).sort((a,b)=>b[1].length-a[1].length).slice(0,15)
  commonTags.forEach(([t,ids])=>{
    for(let i=0;i<ids.length-1;i++){
      const sp=layoutMemory[ids[i]],tp=layoutMemory[ids[i+1]]
      if(!sp||!tp)continue
      ctx.beginPath();ctx.moveTo(sp.x,sp.y);ctx.lineTo(tp.x,tp.y)
      ctx.strokeStyle='#cba6f712';ctx.lineWidth=0.5;ctx.stroke()
    }
  })
  // Nodes
  nodes.forEach(n=>{
    const p=layoutMemory[n.id];if(!p)return
    const r=n.type==='OUTIL'?8:computeRadius(n)
    const c=NODE_COLORS[n.type]||'#6c7086'
    const nat=computeNature(n.tags)
    const isHover=hoverNode===n.id
    // Nature glow
    if(nat&&NATURE_COLORS[nat]){
      const ng=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,r+6)
      ng.addColorStop(0,NATURE_COLORS[nat]+'30');ng.addColorStop(1,NATURE_COLORS[nat]+'00')
      ctx.beginPath();ctx.arc(p.x,p.y,r+6,0,Math.PI*2);ctx.fillStyle=ng;ctx.fill()
    }
    ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2)
    ctx.fillStyle=(nat?NATURE_COLORS[nat]:c)+(isHover?'ff':'a0');ctx.fill()
    if(n.type==='OUTIL'&&n.tags.includes('mnemolite')){
      ctx.strokeStyle='#cba6f7';ctx.lineWidth=1.5;ctx.stroke()
    }
    // Incandescent sparks
    if(nat==='incandescent'){
      const fl=0.3+Math.sin(time*0.08+p.x)*0.3
      ctx.beginPath();ctx.arc(p.x,p.y,r+4,0,Math.PI*2)
      ctx.fillStyle='#f38ba8'+Math.floor(fl*60).toString(16).padStart(2,'0');ctx.fill()
    }
  })
  // Organ ring
  Object.entries(ORGAN_IDS).forEach(([id,sym])=>{
    const p=layoutMemory[id];if(!p)return
    drawHex(p.x,p.y,20,ORGAN_COLORS[sym])
    ctx.fillStyle='#cdd6f4';ctx.font='bold 14px JetBrains Mono';ctx.textAlign='center';ctx.textBaseline='middle'
    ctx.fillText(sym,p.x,p.y)
  })
}

// ─── Main loop ───
function loop(){
  time++
  ctx.clearRect(0,0,C.width,C.height)
  ctx.save()
  // Camera transform
  ctx.translate(C.width/2,C.height/2)
  ctx.scale(cam.z,cam.z)
  ctx.translate(cam.x,cam.y)

  if(mode==='heart')drawHeart()
  else if(mode==='timeline')drawTimeline()
  else if(mode==='memory')drawMemory()

  ctx.restore()
  requestAnimationFrame(loop)
}

// ─── Interaction: pan/zoom ───
C.addEventListener('mousedown',e=>{drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y}})
C.addEventListener('mousemove',e=>{
  if(drag){cam.x=drag.cx+(e.clientX-drag.x)/cam.z;cam.y=drag.cy+(e.clientY-drag.y)/cam.z}
  // Hover detection
  const mx=(e.clientX-C.width/2)/cam.z-cam.x
  const my=(e.clientY-C.height/2)/cam.z-cam.y
  const layout=mode==='heart'?layoutHeart:mode==='timeline'?layoutTimeline:layoutMemory
  hoverNode=null
  for(const n of nodes){
    const p=layout[n.id];if(!p)continue
    const r=computeRadius(n)+4
    if(Math.abs(mx-p.x)<r&&Math.abs(my-p.y)<r){hoverNode=n.id;break}
  }
  // Tooltip
  const tt=document.getElementById('tooltip')
  if(hoverNode){
    const n=nodes.find(m=>m.id===hoverNode)
    tt.style.display='block';tt.style.left=(e.clientX+12)+'px';tt.style.top=(e.clientY+12)+'px'
    tt.innerHTML=`<div class="tt-label">${n.label}</div><div class="tt-content">${n.content||''}</div><div class="tt-tags">${n.tags.map(t=>`<span class="tt-tag">${t}</span>`).join('')}</div>`
  }else{tt.style.display='none'}
})
C.addEventListener('mouseup',()=>{drag=null})
C.addEventListener('wheel',e=>{
  e.preventDefault()
  cam.z*=e.deltaY>0?0.9:1.1
  cam.z=Math.max(0.1,Math.min(5,cam.z))
},{passive:false})

// ─── Mode switch ───
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'))
    btn.classList.add('active')
    mode=btn.dataset.mode
    cam={x:0,y:0,z:mode==='timeline'?0.6:0.8}
    hoverNode=null;particles=[]
    document.getElementById('nature-legend').style.display=mode==='memory'?'block':'none'
    document.getElementById('timeline-controls').style.display=mode==='timeline'?'flex':'none'
    updateLegend();updateStats()
  })
})

// ─── HUD ───
function updateLegend(){
  const lg=document.getElementById('legend')
  if(mode==='memory'){
    lg.innerHTML=Object.entries(NATURE_COLORS).map(([k,v])=>
      `<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k}</div>`).join('')
  }else{
    lg.innerHTML=Object.entries(NODE_COLORS).map(([k,v])=>
      `<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k}</div>`).join('')
  }
  // Nature legend
  const nl=document.getElementById('nature-legend')
  nl.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Natures Mnemolite</div>`+
    Object.entries(NATURE_COLORS).map(([k,v])=>{
      const desc={permanent:'Scellé, immuable',vivide:'Actif, validé',volatile:'En incubation',incandescent:'Braises à consumer'}[k]
      return`<div class="legend-row"><div class="legend-dot" style="background:${v}"></div>${k} — ${desc}</div>`
    }).join('')
}

function updateStats(){
  const st=document.getElementById('stats')
  if(mode==='memory'){
    const memNodes=nodes.filter(n=>n.type==='MEMOIRE'||n.type==='PATTERN'||n.type==='DRIFT'||n.type==='MUTATION')
    const counts={permanent:0,vivide:0,volatile:0,incandescent:0}
    memNodes.forEach(n=>{const nat=computeNature(n.tags)||'vivide';counts[nat]++})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Écosystème Mémoire</div>`+
      `<div><span class="val blue">${counts.permanent}</span> permanent</div>`+
      `<div><span class="val green">${counts.vivide}</span> vivide</div>`+
      `<div><span class="val yellow">${counts.volatile}</span> volatile</div>`+
      `<div><span class="val red">${counts.incandescent}</span> incandescent</div>`+
      `<div style="margin-top:6px;color:#6c7086">${memNodes.length} nœuds mémoire</div>`
  }else if(mode==='timeline'){
    const byType={}
    nodes.forEach(n=>{byType[n.type]=(byType[n.type]||0)+1})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Timeline</div>`+
      Object.entries(byType).map(([k,v])=>`<div><span class="val">${v}</span> ${k}</div>`).join('')
  }else{
    const byType={}
    nodes.forEach(n=>{byType[n.type]=(byType[n.type]||0)+1})
    st.innerHTML=`<div style="color:#89b4fa;font-weight:700;margin-bottom:4px">Cœur Cognitif</div>`+
      `<div><span class="val">${nodes.length}</span> nœuds</div>`+
      `<div><span class="val">${edges.length}</span> arêtes</div>`+
      `<div style="margin-top:6px;color:#6c7086">${particles.length} particules</div>`+
      Object.entries(byType).slice(0,5).map(([k,v])=>`<div><span class="val">${v}</span> ${k}</div>`).join('')
  }
}

// ─── Init ───
(function initData(){
  nodes=GRAPH_DATA.nodes;edges=GRAPH_DATA.edges
  computeLayouts()
  document.getElementById('node-count').textContent=`${nodes.length} nœuds · ${edges.length} arêtes`
  updateLegend();updateStats()
  requestAnimationFrame(loop)
})()

cam={x:0,y:0,z:0.8}
</script>
</body>
